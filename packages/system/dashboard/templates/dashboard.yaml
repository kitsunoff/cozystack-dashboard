apiVersion: apps/v1
kind: Deployment
metadata:
  name: cozy-dashboard-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: cozy-dashboard
      app.kubernetes.io/name: web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: cozy-dashboard
        app.kubernetes.io/name: web
    spec:
      serviceAccountName: cozy-dashboard-web
      enableServiceLinks: false
      priorityClassName: system-cluster-critical
      containers:
        - name: web
          image: {{ .Values.dashboard.image | quote }}
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
              ephemeral-storage: 50Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
