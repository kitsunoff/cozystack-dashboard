apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "dashboard.fullname" . }}
  labels:
    {{- include "dashboard.labels" . | nindent 4 }}
rules:
  # Dashboard CRDs (cluster-scoped, read-only)
  - apiGroups: ["dashboard.cozystack.io"]
    resources:
      - marketplacepanels
      - factories
      - customformsoverrides
      - customformsprefills
      - cfomappings
      - customcolumnsoverrides
      - dashboardforms
    verbs: ["get", "list", "watch"]

  # Application definitions and workload monitoring (cluster/namespaced, read-only)
  - apiGroups: ["cozystack.io"]
    resources:
      - applicationdefinitions
      - workloadmonitors
      - workloads
    verbs: ["get", "list", "watch"]

  # Application instances (namespaced, full CRUD for all dynamic app types)
  - apiGroups: ["apps.cozystack.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Core resources
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events", "secrets"]
    verbs: ["get", "list", "watch"]

  # Storage classes
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]

  # Cluster API (machine deployments for K8s clusters)
  - apiGroups: ["cluster.x-k8s.io"]
    resources: ["machinedeployments"]
    verbs: ["get", "list", "watch"]

  # KubeVirt VNC console access
  - apiGroups: ["subresources.kubevirt.io"]
    resources: ["virtualmachineinstances/vnc"]
    verbs: ["get"]
